name: Rust CI/CD

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        components: rustfmt, clippy
        override: true

    - name: Cache cargo
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: sshm

    - name: Check formatting
      run: cargo fmt --manifest-path sshm/Cargo.toml -- --check

    - name: Run clippy
      run: cargo clippy --manifest-path sshm/Cargo.toml --all-targets --all-features

  test:
    needs: check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        override: true

    - name: Cache cargo
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: sshm

    - name: Run tests
      run: cargo test --manifest-path sshm/Cargo.toml --all-features

  coverage:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        override: true

    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov

    - name: Cache cargo
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: sshm

    - name: Generate coverage with 80% threshold
      run: |
        cargo llvm-cov --manifest-path sshm/Cargo.toml --all-features \
          --fail-under-lines 80 \
          --fail-under-functions 80 \
          --lcov --output-path lcov.info

    - name: Upload coverage artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: lcov.info

  security:
    needs: check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install cargo-audit
      uses: taiki-e/install-action@cargo-audit

    - name: Security audit
      working-directory: sshm
      run: cargo audit

  build-linux:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, coverage, security]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        target: x86_64-unknown-linux-musl
        override: true

    - name: Install musl tools
      run: sudo apt-get update && sudo apt-get install -y musl-tools

    - name: Cache cargo
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: sshm

    - name: Build release
      run: cargo build --release --target x86_64-unknown-linux-musl --manifest-path sshm/Cargo.toml

    - name: Strip binary
      run: strip sshm/target/x86_64-unknown-linux-musl/release/sshm

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: sshm-linux
        path: sshm/target/x86_64-unknown-linux-musl/release/sshm

  build-macos:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, coverage, security]
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        target: x86_64-apple-darwin
        override: true

    - name: Cache cargo
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: sshm

    - name: Build release
      run: cargo build --release --target x86_64-apple-darwin --manifest-path sshm/Cargo.toml

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: sshm-macos
        path: sshm/target/x86_64-apple-darwin/release/sshm

  build-windows:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, coverage, security]
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        target: x86_64-pc-windows-msvc
        override: true

    - name: Cache cargo
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: sshm

    - name: Build release
      run: cargo build --release --target x86_64-pc-windows-msvc --manifest-path sshm/Cargo.toml

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: sshm-windows
        path: sshm/target/x86_64-pc-windows-msvc/release/sshm.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: List artifacts
      run: ls -la artifacts/

    - name: Rename binaries
      run: |
        mv artifacts/sshm-linux/sshm sshm-linux-x86_64
        mv artifacts/sshm-macos/sshm sshm-macos
        mv artifacts/sshm-windows/sshm.exe sshm-windows-x86_64.exe

    - name: Create release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          sshm-linux-x86_64
          sshm-macos
          sshm-windows-x86_64.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

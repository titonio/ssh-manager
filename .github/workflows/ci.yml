name: Rust CI/CD

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        components: rustfmt, clippy
        override: true

    - name: Cache cargo
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: sshm

    - name: Check formatting
      run: cargo fmt --manifest-path sshm/Cargo.toml -- --check

    - name: Run clippy
      run: cargo clippy --manifest-path sshm/Cargo.toml --all-targets --all-features

  test:
    needs: check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        override: true

    - name: Cache cargo
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: sshm

    - name: Run tests
      run: cargo test --manifest-path sshm/Cargo.toml --all-features

  coverage:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        override: true

    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov

    - name: Cache cargo
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: sshm

    - name: Generate coverage with 80% threshold
      run: |
        cargo llvm-cov --manifest-path sshm/Cargo.toml --all-features \
          --fail-under-lines 80 \
          --fail-under-functions 80 \
          --lcov --output-path lcov.info

    - name: Upload coverage artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: lcov.info

  security:
    needs: check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install cargo-audit
      uses: taiki-e/install-action@cargo-audit

    - name: Security audit
      working-directory: sshm
      run: cargo audit

  build-linux:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, coverage, security]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        target: x86_64-unknown-linux-musl
        override: true

    - name: Install musl tools
      run: sudo apt-get update && sudo apt-get install -y musl-tools

    - name: Cache cargo
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: sshm

    - name: Build release
      run: cargo build --release --target x86_64-unknown-linux-musl --manifest-path sshm/Cargo.toml

    - name: Strip binary
      run: strip sshm/target/x86_64-unknown-linux-musl/release/sshm

    - name: Get version from Cargo.toml
      id: cargo_version
      run: echo "version=$(sed -n 's/^version = "\([^"]*\)"/\1/p' sshm/Cargo.toml)" >> $GITHUB_OUTPUT

    - name: Create tarball
      run: |
        cd sshm/target/x86_64-unknown-linux-musl/release
        tar czvf ../../../../sshm-v${{ steps.cargo_version.outputs.version }}-x86_64-unknown-linux-musl.tar.gz sshm

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: sshm-linux
        path: sshm-v${{ steps.cargo_version.outputs.version }}-x86_64-unknown-linux-musl.tar.gz

  build-macos:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, coverage, security]
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        target: ${{ matrix.target }}
        override: true

    - name: Cache cargo
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: sshm

    - name: Build release
      run: cargo build --release --target ${{ matrix.target }} --manifest-path sshm/Cargo.toml

    - name: Get version from Cargo.toml
      id: cargo_version
      run: echo "version=$(sed -n 's/^version = "\([^"]*\)"/\1/p' sshm/Cargo.toml)" >> $GITHUB_OUTPUT

    - name: Create tarball
      run: |
        cd sshm/target/${{ matrix.target }}/release
        tar czvf ../../../../sshm-v${{ steps.cargo_version.outputs.version }}-${{ matrix.target }}.tar.gz sshm

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: sshm-macos-${{ matrix.target }}
        path: sshm-v${{ steps.cargo_version.outputs.version }}-${{ matrix.target }}.tar.gz

  build-windows:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, coverage, security]
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        target: x86_64-pc-windows-msvc
        override: true

    - name: Cache cargo
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: sshm

    - name: Build release
      run: cargo build --release --target x86_64-pc-windows-msvc --manifest-path sshm/Cargo.toml

    - name: Get version from Cargo.toml
      id: cargo_version
      run: |
        $version = (Get-Content sshm/Cargo.toml -Raw) -replace '.*version = "([^"]+)".*', '$1'
        echo "version=$version" >> $env:GITHUB_OUTPUT
      shell: pwsh

    - name: Create zip archive
      run: |
        cd sshm/target/x86_64-pc-windows-msvc/release
        Compress-Archive -Path sshm.exe -DestinationPath ../../../../sshm-v${{ steps.cargo_version.outputs.version }}-x86_64-pc-windows-msvc.zip
      shell: pwsh

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: sshm-windows
        path: sshm-v${{ steps.cargo_version.outputs.version }}-x86_64-pc-windows-msvc.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: List artifacts
      run: ls -la artifacts/

    - name: Create release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/sshm-linux/*.tar.gz
          artifacts/sshm-macos-*/*.tar.gz
          artifacts/sshm-windows/*.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
